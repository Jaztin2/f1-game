<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>F1 Rush - Mobile Racing</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    font-family: 'Arial', sans-serif;
    overflow: hidden;
    height: 100vh; width: 100vw;
    user-select: none; -webkit-user-select: none;
  }
  .screen { display: none; position: absolute; inset: 0; }
  .screen.active { display: flex; flex-direction: column; }

  #startScreen {
    background: linear-gradient(180deg, #0a0a1a 0%, #1a0a2e 50%, #0d0d0d 100%);
    align-items: center; justify-content: center; gap: 18px; padding: 20px;
  }
  .game-title {
    font-size: 48px; font-weight: 900; color: #e10600;
    text-shadow: 0 0 20px #e10600, 0 0 40px #ff4400;
    letter-spacing: 4px; text-align: center;
  }
  .game-subtitle {
    font-size: 14px; color: #888; letter-spacing: 6px;
    text-transform: uppercase; margin-top: -14px;
  }
  .start-section {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px; padding: 16px;
    width: 100%; max-width: 340px;
  }
  .start-section label {
    display: block; color: #aaa; font-size: 11px;
    letter-spacing: 2px; text-transform: uppercase; margin-bottom: 8px;
  }
  .start-section input {
    width: 100%; background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px; padding: 12px; color: #fff; font-size: 16px; outline: none;
  }
  .car-select { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  .car-option {
    background: rgba(255,255,255,0.05);
    border: 2px solid rgba(255,255,255,0.1);
    border-radius: 12px; padding: 8px;
    cursor: pointer; transition: all 0.2s; text-align: center;
    -webkit-tap-highlight-color: transparent;
  }
  .car-option.selected { box-shadow: 0 0 16px 2px rgba(255,255,255,0.15); }
  .team-logo { display: block; width: 76px; height: 68px; object-fit: contain; border-radius: 8px; background: rgba(255,255,255,0.06); }
  .car-option .car-name {
    font-size: 10px; color: #ccc; margin-top: 6px;
    font-weight: 700; letter-spacing: 1px;
  }
  .btn-start {
    background: linear-gradient(135deg, #e10600, #ff4422);
    color: #fff; font-size: 18px; font-weight: 900;
    letter-spacing: 3px; border: none; border-radius: 50px;
    padding: 16px 40px; cursor: pointer;
    width: 100%; max-width: 340px; text-transform: uppercase;
    box-shadow: 0 8px 30px rgba(225,6,0,0.4);
    transition: transform 0.1s, box-shadow 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn-start:active { transform: scale(0.96); box-shadow: 0 4px 15px rgba(225,6,0,0.3); }

  #gameScreen { background: #000; flex-direction: column; position: relative; }
  #hud {
    position: absolute; top: 0; left: 0; right: 0; z-index: 20;
    display: flex; justify-content: space-between; align-items: center;
    padding: 8px 12px;
    background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, transparent 100%);
  }
  .hud-box {
    background: rgba(0,0,0,0.7); border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px; padding: 5px 10px; text-align: center; min-width: 60px;
  }
  .hud-label { font-size: 9px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
  .hud-value { font-size: 18px; font-weight: 900; color: #fff; line-height: 1; }
  .hud-value.pos { color: #f5c518; font-size: 22px; }
  .hud-value.lap { color: #00d2ff; }
  .hud-value.speed { color: #00ff88; font-size: 14px; }
  #eventBanner {
    position: absolute; top: 70px; left: 50%; transform: translateX(-50%);
    z-index: 30; background: rgba(0,0,0,0.85); border-radius: 20px;
    padding: 8px 20px; font-size: 13px; font-weight: 700; color: #fff;
    text-align: center; white-space: nowrap; display: none;
    border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(4px);
  }
  #raceCanvas { display: block; position: absolute; top: 0; left: 0; }
  #controls {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: flex-end; justify-content: space-between;
    padding: 10px 18px 26px;
    background: linear-gradient(transparent, rgba(0,0,0,0.88) 35%);
    pointer-events: none;
  }
  .ctrl-label { font-size: 11px; color: rgba(255,255,255,0.7); letter-spacing: 3px; font-weight: 900; }
  #tiltGuide {
    display: flex; flex-direction: column; align-items: center; gap: 4px;
    pointer-events: none;
  }
  .tilt-arrows { font-size: 28px; color: rgba(255,255,255,0.55); letter-spacing: 4px; }
  #nitroWrap {
    pointer-events: none; display: flex; flex-direction: column;
    align-items: center; gap: 7px; flex: 1; max-width: 200px; margin: 0 12px 2px;
  }
  #nitroHoldLabel {
    font-size: 11px; color: rgba(0,220,255,0.9); letter-spacing: 1px;
    font-weight: 900; text-shadow: 0 0 10px #00aaff;
  }
  #nitroBarBg {
    width: 100%; height: 14px; background: rgba(0,0,0,0.55);
    border-radius: 7px; border: 2px solid rgba(255,255,255,0.35); overflow: hidden;
  }
  #nitroBarFill {
    height: 100%; width: 0%;
    background: linear-gradient(90deg, #0055ff, #00ccff, #00ffee);
    border-radius: 7px; box-shadow: 0 0 10px #00aaff; transition: width 0.1s;
  }
  #nitroBarFill.active {
    background: linear-gradient(90deg, #ff0080, #ff5500, #ffdd00);
    box-shadow: 0 0 18px #ff6600;
  }
  #pitBtn {
    width: 60px; height: 60px; border-radius: 16px; font-size: 22px; color: #fff;
    display: flex; flex-direction: column; gap: 2px;
    align-items: center; justify-content: center;
    pointer-events: all; cursor: pointer; -webkit-tap-highlight-color: transparent;
    background: rgba(180,120,0,0.3); border: 2px solid #ffcc00;
    box-shadow: 0 0 14px rgba(255,200,0,0.5), 0 4px 16px rgba(0,0,0,0.8);
  }
  #pitBtn span { font-size: 10px; letter-spacing: 1px; color: #ffdd44; font-weight: 900; }
  #pitBtn:active { background: rgba(255,200,0,0.45); transform: scale(0.91); }
  @media (orientation: landscape) {
    #controls { padding: 6px 18px 12px; }
    #nitroBarBg { height: 10px; }
    #nitroWrap { gap: 4px; }
    #pitBtn { width: 48px; height: 48px; font-size: 18px; }
  }

  #resultScreen {
    background: linear-gradient(180deg, #0a0a1a 0%, #1a0a2e 60%, #0d0d0d 100%);
    align-items: center; justify-content: center; gap: 16px; padding: 24px;
  }
  .result-title { font-size: 36px; font-weight: 900; color: #f5c518; letter-spacing: 2px; text-shadow: 0 0 20px #f5c518; }
  .result-podium { font-size: 52px; text-align: center; }
  .result-card {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px; width: 100%; max-width: 340px; overflow: hidden;
  }
  .result-row {
    display: flex; align-items: center;
    padding: 12px 16px; border-bottom: 1px solid rgba(255,255,255,0.05); gap: 12px;
  }
  .result-row:last-child { border-bottom: none; }
  .result-row.player-row { background: rgba(225,6,0,0.12); border-left: 3px solid #e10600; }
  .result-pos { font-size: 22px; font-weight: 900; width: 40px; color: #888; }
  .result-pos.p1 { color: #f5c518; }
  .result-pos.p2 { color: #bbb; }
  .result-pos.p3 { color: #cd7f32; }
  .result-team-badge {
    width: 40px; height: 22px; border-radius: 5px;
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; font-weight: 900; letter-spacing: 0.5px; flex-shrink: 0;
  }
  .result-name { flex: 1; font-size: 14px; color: #fff; font-weight: 700; }
  .result-time { font-size: 12px; color: #888; }
  .btn-play-again {
    background: linear-gradient(135deg, #e10600, #ff4422); color: #fff;
    font-size: 16px; font-weight: 900; letter-spacing: 2px;
    border: none; border-radius: 50px; padding: 14px 36px; cursor: pointer;
    text-transform: uppercase; box-shadow: 0 8px 30px rgba(225,6,0,0.4);
    -webkit-tap-highlight-color: transparent;
  }
  .btn-play-again:active { transform: scale(0.96); }
  #countdown {
    position: absolute; inset: 0; z-index: 50;
    display: flex; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.7); font-size: 90px; font-weight: 900; color: #fff;
  }
  #tireIndicator {
    position: absolute; top: 70px; right: 12px; z-index: 20;
    font-size: 11px; color: #aaa; text-align: center;
  }
  #tireDot {
    width: 14px; height: 14px; border-radius: 50%; background: #fff;
    margin: 2px auto 0; transition: background 0.5s;
  }
  .rotate-hint {
    font-size: 12px; color: #555; letter-spacing: 2px; text-align: center;
    margin-top: -8px;
  }
  @media (orientation: landscape) { .rotate-hint { display: none; } }
</style>
</head>

</div>

<script>
// ── TEAM DATA ──────────────────────────────
const TEAMS = [
  { name:'Ferrari',  short:'FER', primary:'#E8002D', secondary:'#FFFFFF', accent:'#FFD700', nose:'#E8002D',  wing:'#C8001A', cockpit:'#FFFFFF' },
  { name:'Red Bull', short:'RBR', primary:'#1E3A8A', secondary:'#FFFFFF', accent:'#FFD700', nose:'#1E3A8A',  wing:'#0D2060', cockpit:'#1E3A8A' },
  { name:'McLaren',  short:'MCL', primary:'#FF8000', secondary:'#000000', accent:'#FFFFFF', nose:'#FF8000',  wing:'#FF8000', cockpit:'#000000' },
  { name:'Mercedes', short:'AMG', primary:'#1B1B1B', secondary:'#C0C0C0', accent:'#00D2BE', nose:'#1B1B1B',  wing:'#2a2a2a', cockpit:'#1B1B1B' },
];

// ── GAME STATE ─────────────────────────────
const TOTAL_LAPS = 3;
const TRACK_WIDTH_RATIO = 0.72;
const LAP_DISTANCE = 6000;
const CAR_W = 28, CAR_H = 52;
const LANE_COUNT = 3;
let gTrackL = 0, gTrackW = 0, gLaneW = 0;

let canvas, ctx, W, H;
let animId;
let gameRunning = false;
let playerCarIdx = 0;
let playerName = 'Driver';
let roadOffset = 0;
const STRIPE_H = 60;
let cars = [];
let leftHeld = false, rightHeld = false;
let laneChangeCooldown = 0;
let nitroCharge = 0;
let nitroActive = false;
let tiltAngle = 0;
let tiltEnabled = false;
let countdownIv = null, countdownTo = null;
let activeEvent = null;
let eventCooldown = 0;
let raceStartTime = 0;
let raceFinished = false;
let finishOrder = [];

const hudPos      = document.getElementById('hudPos');
const hudLap      = document.getElementById('hudLap');
const hudSpeed    = document.getElementById('hudSpeed');
const eventBanner = document.getElementById('eventBanner');
const countdownEl = document.getElementById('countdown');
const tireDot     = document.getElementById('tireDot');
const resultPodium= document.getElementById('resultPodium');
const resultCard  = document.getElementById('resultCard');

// ── TEAM LOGO BADGES ───────────────────────
function rrect(c, x, y, w, h, r) {
  c.beginPath();
  c.moveTo(x+r,y); c.lineTo(x+w-r,y); c.quadraticCurveTo(x+w,y,x+w,y+r);
  c.lineTo(x+w,y+h-r); c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  c.lineTo(x+r,y+h); c.quadraticCurveTo(x,y+h,x,y+h-r);
  c.lineTo(x,y+r); c.quadraticCurveTo(x,y,x+r,y);
  c.closePath();
}

function initTeamLogos() {
  document.querySelectorAll('.team-logo').forEach(cvs => {
    const idx = parseInt(cvs.dataset.team);
    const c = cvs.getContext('2d');
    drawTeamBadge(c, idx, cvs.width, cvs.height);
  });
  // Set initial selected style
  const firstOpt = document.querySelector('.car-option[data-idx="0"]');
  applySelectedStyle(firstOpt, 0);
}

function applySelectedStyle(el, idx) {
  document.querySelectorAll('.car-option').forEach(o => {
    o.classList.remove('selected');
    o.style.borderColor = 'rgba(255,255,255,0.1)';
    o.style.background = 'rgba(255,255,255,0.05)';
  });
  el.classList.add('selected');
  el.style.borderColor = TEAMS[idx].primary;
  el.style.background = TEAMS[idx].primary + '22';
}

function drawTeamBadge(c, idx, w, h) {
  const t = TEAMS[idx];
  // Background
  const bg = c.createLinearGradient(0, 0, w, h);
  if (idx === 0) { bg.addColorStop(0,'#E8002D'); bg.addColorStop(1,'#9a0020'); }
  else if (idx === 1) { bg.addColorStop(0,'#0D2060'); bg.addColorStop(1,'#1E3A8A'); }
  else if (idx === 2) { bg.addColorStop(0,'#CC6000'); bg.addColorStop(1,'#FF8000'); }
  else { bg.addColorStop(0,'#2a2a2a'); bg.addColorStop(1,'#111'); }
  c.fillStyle = bg;
  rrect(c, 0, 0, w, h, 10);
  c.fill();

  const cx = w / 2, cy = h / 2 - 5;

  if (idx === 0) drawFerrariLogo(c, cx, cy);
  else if (idx === 1) drawRedBullLogo(c, cx, cy);
  else if (idx === 2) drawMcLarenLogo(c, cx, cy);
  else drawMercedesLogo(c, cx, cy);

  // Team short name at bottom
  c.fillStyle = TEAMS[idx].accent;
  c.font = 'bold 9px Arial';
  c.textAlign = 'center';
  c.fillText(t.short, w/2, h - 5);
}

function drawFerrariLogo(c, cx, cy) {
  // Yellow shield
  c.fillStyle = '#FFD700';
  c.beginPath();
  c.moveTo(cx, cy - 24);
  c.lineTo(cx + 18, cy - 14);
  c.lineTo(cx + 18, cy + 8);
  c.lineTo(cx, cy + 24);
  c.lineTo(cx - 18, cy + 8);
  c.lineTo(cx - 18, cy - 14);
  c.closePath();
  c.fill();

  // Horse body
  c.fillStyle = '#000';
  c.beginPath();
  c.ellipse(cx + 2, cy + 7, 7, 5, 0.2, 0, Math.PI*2);
  c.fill();
  // Neck + head
  c.beginPath();
  c.moveTo(cx - 1, cy + 2);
  c.bezierCurveTo(cx - 8, cy - 6, cx - 10, cy - 15, cx - 3, cy - 19);
  c.bezierCurveTo(cx + 1, cy - 21, cx + 5, cy - 17, cx + 3, cy - 11);
  c.bezierCurveTo(cx + 2, cy - 5, cx + 2, cy, cx + 1, cy + 2);
  c.closePath();
  c.fill();
  // Raised front leg
  c.fillRect(cx + 5, cy - 2, 3, 10);
  // Rear legs
  c.fillRect(cx - 5, cy + 10, 3, 11);
  c.fillRect(cx + 3, cy + 10, 3, 11);
  // Tail
  c.beginPath();
  c.moveTo(cx + 8, cy + 5);
  c.bezierCurveTo(cx + 15, cy + 2, cx + 18, cy + 10, cx + 12, cy + 18);
  c.strokeStyle = '#000';
  c.lineWidth = 3;
  c.lineCap = 'round';
  c.stroke();
}

function drawRedBullLogo(c, cx, cy) {
  // White oval background
  c.fillStyle = '#FFFFFF';
  c.beginPath();
  c.ellipse(cx, cy + 5, 20, 16, 0, 0, Math.PI*2);
  c.fill();

  // Bull head
  c.fillStyle = '#1E3A8A';
  c.beginPath();
  c.ellipse(cx, cy + 8, 10, 9, 0, 0, Math.PI*2);
  c.fill();
  // Left horn
  c.beginPath();
  c.moveTo(cx - 8, cy + 1);
  c.bezierCurveTo(cx - 16, cy - 14, cx - 7, cy - 22, cx - 2, cy - 13);
  c.bezierCurveTo(cx - 4, cy - 8, cx - 6, cy - 4, cx - 6, cy + 1);
  c.closePath();
  c.fill();
  // Right horn
  c.beginPath();
  c.moveTo(cx + 8, cy + 1);
  c.bezierCurveTo(cx + 16, cy - 14, cx + 7, cy - 22, cx + 2, cy - 13);
  c.bezierCurveTo(cx + 4, cy - 8, cx + 6, cy - 4, cx + 6, cy + 1);
  c.closePath();
  c.fill();
  // Nose ring
  c.strokeStyle = '#E8002D';
  c.lineWidth = 2.5;
  c.beginPath();
  c.arc(cx, cy + 13, 5, 0, Math.PI*2);
  c.stroke();
  // Eyes
  c.fillStyle = '#FFF';
  c.beginPath(); c.arc(cx - 4, cy + 5, 2, 0, Math.PI*2); c.fill();
  c.beginPath(); c.arc(cx + 4, cy + 5, 2, 0, Math.PI*2); c.fill();
}

function drawMcLarenLogo(c, cx, cy) {
  // Large swoosh — white glow outline
  c.strokeStyle = 'rgba(255,255,255,0.3)';
  c.lineWidth = 9;
  c.lineCap = 'round';
  c.beginPath();
  c.moveTo(cx - 24, cy + 14);
  c.bezierCurveTo(cx - 8, cy - 4, cx + 8, cy - 4, cx + 24, cy - 14);
  c.stroke();
  // Main swoosh
  c.strokeStyle = '#000';
  c.lineWidth = 7;
  c.beginPath();
  c.moveTo(cx - 24, cy + 14);
  c.bezierCurveTo(cx - 8, cy - 4, cx + 8, cy - 4, cx + 24, cy - 14);
  c.stroke();
  // Second smaller swoosh
  c.strokeStyle = '#000';
  c.lineWidth = 4;
  c.beginPath();
  c.moveTo(cx - 22, cy + 21);
  c.bezierCurveTo(cx - 4, cy + 6, cx + 8, cy + 4, cx + 26, cy - 6);
  c.stroke();
  // Speed dots
  c.fillStyle = '#000';
  for (let i = 0; i < 3; i++) {
    c.beginPath();
    c.arc(cx - 8 + i * 9, cy - 16 - i * 2, 2, 0, Math.PI*2);
    c.fill();
  }
}

function drawMercedesLogo(c, cx, cy) {
  // Teal outer ring
  c.strokeStyle = '#00D2BE';
  c.lineWidth = 3;
  c.beginPath();
  c.arc(cx, cy, 24, 0, Math.PI*2);
  c.stroke();
  // Silver inner ring
  c.strokeStyle = '#C0C0C0';
  c.lineWidth = 2;
  c.beginPath();
  c.arc(cx, cy, 20, 0, Math.PI*2);
  c.stroke();
  // Three-pointed star
  c.fillStyle = '#C0C0C0';
  c.beginPath();
  const outerR = 18, innerR = 7;
  for (let i = 0; i < 6; i++) {
    const angle = (i * 60 - 90) * Math.PI / 180;
    const r = i % 2 === 0 ? outerR : innerR;
    if (i === 0) c.moveTo(cx + r * Math.cos(angle), cy + r * Math.sin(angle));
    else c.lineTo(cx + r * Math.cos(angle), cy + r * Math.sin(angle));
  }
  c.closePath();
  c.fill();
  // Center dot
  c.fillStyle = '#1B1B1B';
  c.beginPath(); c.arc(cx, cy, 4, 0, Math.PI*2); c.fill();
}

// ── SCREEN MANAGEMENT ──────────────────────
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('playAgainBtn').addEventListener('click', () => showScreen('startScreen'));

document.getElementById('carSelect').addEventListener('click', e => {
  const opt = e.target.closest('.car-option');
  if (!opt) return;
  playerCarIdx = parseInt(opt.dataset.idx);
  applySelectedStyle(opt, playerCarIdx);
});

function startGame() {
  playerName = document.getElementById('playerNameInput').value.trim() || 'Driver';
  if (screen.orientation && screen.orientation.lock) {
    screen.orientation.lock('landscape').catch(() => {});
  }
  // Cancel any in-progress timers from previous race
  if (countdownIv) { clearInterval(countdownIv); countdownIv = null; }
  if (countdownTo) { clearTimeout(countdownTo);  countdownTo = null; }
  gameRunning = false;
  if (animId) cancelAnimationFrame(animId);

  showScreen('gameScreen');
  initCanvas();
  buildCars();

  roadOffset = 0;
  raceFinished = false;
  finishOrder = [];
  activeEvent = null;
  eventCooldown = 300;
  leftHeld = rightHeld = false;
  laneChangeCooldown = 0;
  nitroCharge = 0;
  nitroActive = false;

  lastTime = 0;
  enableTilt();
  doCountdown();
}

function initCanvas() {
  canvas = document.getElementById('raceCanvas');
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width  = W;
  canvas.height = H;
  canvas.style.width  = W + 'px';
  canvas.style.height = H + 'px';
  ctx = canvas.getContext('2d');
}

function computeTrack() {
  // Cap track width so it's not absurdly wide in landscape
  gTrackW = Math.min(W * TRACK_WIDTH_RATIO, H * 0.88);
  gTrackL = (W - gTrackW) / 2;
  gLaneW  = gTrackW / LANE_COUNT;
}

function buildCars() {
  cars = [];
  computeTrack();
  const trackW = gTrackW, trackL = gTrackL, laneW = gLaneW;
  function laneX(lane) { return trackL + laneW * lane + laneW / 2; }

  const aiNames = ['Verstappen','Hamilton','Leclerc','Norris'];
  const usedIdx = [playerCarIdx];

  for (let i = 0; i < 4; i++) {
    const isPlayer = i === 0;
    const colorIdx = isPlayer ? playerCarIdx : (() => {
      let c; do { c = Math.floor(Math.random()*4); } while (usedIdx.includes(c));
      usedIdx.push(c); return c;
    })();
    const startLane = i % LANE_COUNT;
    const aiSpeeds = [4.6, 4.3, 4.8];
    const ms = isPlayer ? 5.0 : aiSpeeds[i - 1] ?? 4.6;
    cars.push({
      x: laneX(startLane), y: H * (0.6 + i * 0.08),
      lane: startLane, laneX: laneX(startLane),
      speed: 0, maxSpeed: ms, baseMaxSpeed: ms,
      targetLane: startLane, lap: 1, dist: 0,
      finished: false, finishTime: null,
      isPlayer, name: isPlayer ? playerName : aiNames[i-1],
      colorIdx, tireWear: 100, pitCooldown: 0,
      inPit: false, pitTimer: 0, blowout: false,
      laneW, trackL, trackW, laneCount: LANE_COUNT,
      aiNitroTimer: 0, aiNitroActive: false, aiLaneTimer: 0,
    });
  }
}

// ── COUNTDOWN ──────────────────────────────
function doCountdown() {
  if (countdownIv) { clearInterval(countdownIv); countdownIv = null; }
  if (countdownTo) { clearTimeout(countdownTo);  countdownTo = null; }
  countdownEl.style.display = 'flex';
  let n = 3;
  countdownEl.textContent = n;
  countdownIv = setInterval(() => {
    n--;
    if (n <= 0) {
      clearInterval(countdownIv); countdownIv = null;
      countdownEl.textContent = '🚦 GO!';
      countdownTo = setTimeout(() => {
        countdownTo = null;
        countdownEl.style.display = 'none';
        gameRunning = true;
        raceStartTime = Date.now();
        lastTime = performance.now();
        requestAnimationFrame(loop);
      }, 600);
    } else {
      countdownEl.textContent = n;
    }
  }, 900);
}

// ── CONTROLS ───────────────────────────────
const pitBtn = document.getElementById('pitBtn');
pitBtn.addEventListener('touchstart', e => { e.preventDefault(); triggerPit(); }, {passive:false});
pitBtn.addEventListener('click', triggerPit);

function activateNitro()   { if (nitroCharge >= 10) nitroActive = true; }
function deactivateNitro() { nitroActive = false; }

// Touch anywhere on the canvas = hold for nitro
const gameScreen = document.getElementById('gameScreen');
gameScreen.addEventListener('touchstart', e => {
  const onPit = [...e.changedTouches].some(t => document.elementFromPoint(t.clientX, t.clientY)?.closest('#pitBtn'));
  if (!onPit) { e.preventDefault(); activateNitro(); }
}, {passive:false});
gameScreen.addEventListener('touchend', e => {
  if (e.touches.length === 0) deactivateNitro();
}, {passive:false});

// Keyboard: arrow keys / WASD for desktop
window.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft'  || e.key === 'a') leftHeld  = true;
  if (e.key === 'ArrowRight' || e.key === 'd') rightHeld = true;
  if (e.key === ' ' || e.key === 'ArrowUp') activateNitro();
});
window.addEventListener('keyup', e => {
  if (e.key === 'ArrowLeft'  || e.key === 'a') leftHeld  = false;
  if (e.key === 'ArrowRight' || e.key === 'd') rightHeld = false;
  if (e.key === ' ' || e.key === 'ArrowUp') deactivateNitro();
});

// Tilt steering via DeviceOrientationEvent
function getTiltAngle(e) {
  const orient = (screen.orientation?.angle ?? window.orientation) || 0;
  if (orient === 90)              return -(e.beta  || 0);
  if (orient === -90 || orient === 270) return  (e.beta  || 0);
  return e.gamma || 0; // portrait
}
function handleOrientation(e) { tiltAngle = getTiltAngle(e); }

async function enableTilt() {
  if (tiltEnabled) return;
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    try {
      const perm = await DeviceOrientationEvent.requestPermission();
      if (perm === 'granted') { window.addEventListener('deviceorientation', handleOrientation); tiltEnabled = true; }
    } catch(e) {}
  } else {
    window.addEventListener('deviceorientation', handleOrientation);
    tiltEnabled = true;
  }
}

function triggerPit() {
  const p = cars.find(c => c.isPlayer);
  if (!p || p.inPit || p.pitCooldown > 0 || p.finished) return;
  p.inPit = true; p.pitTimer = 180;
}

// ── MAIN LOOP ──────────────────────────────
let lastTime = 0;
function loop(ts = 0) {
  if (!gameRunning) return;
  animId = requestAnimationFrame(loop);
  const dt = Math.min((ts - lastTime) / 16.67, 2.5);
  lastTime = ts;
  try { update(dt); } catch(e) { console.error('update error:', e); }
  try { render(); }  catch(e) { console.error('render error:', e); }
}

// ── UPDATE ─────────────────────────────────
function update(dt) {
  const player = cars.find(c => c.isPlayer);
  const scrollSpeed = player && !player.finished ? player.speed * 6 : 0;
  roadOffset = (roadOffset + scrollSpeed * dt) % (STRIPE_H * 2);

  updateEvents(dt);

  if (player && !player.finished && !player.inPit) {
    // Nitro charge/drain
    if (nitroActive && nitroCharge > 0) {
      nitroCharge = Math.max(0, nitroCharge - 55 * (dt / 60));
      if (nitroCharge === 0) nitroActive = false;
    } else {
      nitroActive = false;
      nitroCharge = Math.min(100, nitroCharge + 12 * (dt / 60));
    }
    const nitroMult = (nitroActive && nitroCharge > 0) ? 1.65 : 1.0;
    const targetSpeed = activeEvent?.type === 'safety' ? player.maxSpeed * 0.45
                      : player.blowout ? player.maxSpeed * 0.35 : player.maxSpeed * nitroMult;
    player.speed += (targetSpeed - player.speed) * 0.06 * dt;
    // Tilt overrides left/right held state
    const TILT_THRESH = 13;
    if (tiltEnabled) {
      leftHeld  = tiltAngle < -TILT_THRESH;
      rightHeld = tiltAngle >  TILT_THRESH;
    }
    if (laneChangeCooldown > 0) laneChangeCooldown -= dt;
    if (laneChangeCooldown <= 0) {
      if (leftHeld  && player.targetLane > 0)               { player.targetLane--; laneChangeCooldown = 18; }
      if (rightHeld && player.targetLane < LANE_COUNT - 1)  { player.targetLane++; laneChangeCooldown = 18; }
    }
    player.tireWear = Math.max(0, player.tireWear - 0.015 * dt);
    if (player.tireWear < 20 && !player.blowout && Math.random() < 0.0008 * dt) {
      player.blowout = true;
      showEvent('💥 BLOWOUT! Pit Now!', '#ff4400');
    }
  }

  if (player?.inPit) {
    player.speed = Math.max(0, player.speed - 0.3 * dt);
    player.pitTimer -= dt;
    if (player.pitTimer <= 0) {
      player.inPit = false; player.pitCooldown = 600;
      player.tireWear = 100; player.blowout = false;
      player.maxSpeed = player.baseMaxSpeed;
      showEvent('✅ Pit Done! Fresh tyres!', '#00ff88');
    }
  }
  if (player?.pitCooldown > 0) player.pitCooldown -= dt;

  const trackL = gTrackL, laneW = gLaneW, laneCount = LANE_COUNT;
  for (const car of cars) {
    if (car.finished) continue;
    if (!car.isPlayer) {
      // Rubber-band: if far behind player, boost speed
      const playerProgress = player ? (player.lap - 1) * LAP_DISTANCE + player.dist : 0;
      const aiProgress = (car.lap - 1) * LAP_DISTANCE + car.dist;
      const gap = playerProgress - aiProgress;
      const rubber = gap > 1800 ? 1.06 : 1.0;
      const ts2 = activeEvent?.type === 'safety' ? car.maxSpeed * 0.45
                : car.blowout ? car.maxSpeed * 0.3
                : car.maxSpeed * rubber;
      car.speed += (ts2 - car.speed) * 0.04 * dt;
      car.tireWear = Math.max(0, car.tireWear - 0.018 * dt);
      if (car.tireWear < 15 && !car.blowout && Math.random() < 0.0008 * dt) car.blowout = true;
      if ((car.tireWear < 5 || car.blowout) && !car.inPit) { car.inPit = true; car.pitTimer = 120 + Math.random()*50; }
      if (car.inPit) {
        car.speed = Math.max(0, car.speed - 0.4 * dt);
        car.pitTimer -= dt;
        if (car.pitTimer <= 0) { car.inPit = false; car.tireWear = 100; car.blowout = false; }
      }

      // Smart lane logic: try to block player or overtake nearby AI
      car.aiLaneTimer -= dt;
      if (car.aiLaneTimer <= 0) {
        car.aiLaneTimer = 30 + Math.random() * 60;
        const playerLane = player ? player.targetLane ?? player.lane : -1;
        const nearPlayer = player && Math.abs(gap) < 800;
        let nl;
        if (nearPlayer && gap < 0 && Math.random() < 0.7) {
          // AI is ahead — move to player's lane to block
          nl = playerLane;
        } else if (nearPlayer && gap > 0 && Math.random() < 0.6) {
          // AI is behind — try to get into adjacent lane to overtake
          nl = playerLane + (Math.random() < 0.5 ? -1 : 1);
        } else {
          nl = car.targetLane + (Math.random() < 0.5 ? -1 : 1);
        }
        if (nl >= 0 && nl < laneCount) car.targetLane = nl;
      }
    }
    const tX = trackL + laneW * car.targetLane + laneW / 2;
    car.laneX += (tX - car.laneX) * 0.08 * dt;
    car.x = car.laneX;
    car.dist += car.speed * dt;
    if (car.dist >= LAP_DISTANCE) {
      car.dist -= LAP_DISTANCE; car.lap++;
      if (car.isPlayer && car.lap <= TOTAL_LAPS) showEvent(`🏁 LAP ${car.lap}/${TOTAL_LAPS}`, '#00d2ff');
      if (car.lap > TOTAL_LAPS) {
        car.finished = true; car.finishTime = (Date.now() - raceStartTime) / 1000;
        finishOrder.push(car);
        if (car.isPlayer) endRace();
      }
    }
  }

  if (!raceFinished && cars.every(c => c.finished)) endRace();
  updateHUD(player);
}

// ── EVENTS ─────────────────────────────────
const EVENTS = [
  { type:'rain',   label:'🌧️ RAIN! Slippery Track!', color:'#66aaff', speedMult:0.75, duration:420 },
  { type:'safety', label:'🚗 SAFETY CAR! Slow down!', color:'#ffff00', speedMult:0.45, duration:360 },
  { type:'hail',   label:'🌨️ HAIL! Reduced speed!',  color:'#aaddff', speedMult:0.70, duration:300 },
];

function updateEvents(dt) {
  if (activeEvent) {
    activeEvent.timer -= dt;
    if (activeEvent.timer <= 0) {
      activeEvent = null; eventBanner.style.display = 'none';
      for (const car of cars) car.maxSpeed = car.baseMaxSpeed;
      eventCooldown = 400 + Math.random()*400;
    }
  } else {
    eventCooldown -= dt;
    if (eventCooldown <= 0 && !raceFinished) {
      const ev = EVENTS[Math.floor(Math.random()*EVENTS.length)];
      activeEvent = { ...ev, timer: ev.duration };
      eventBanner.style.display = 'block';
      eventBanner.style.color = ev.color;
      eventBanner.textContent = ev.label;
      for (const car of cars) car.maxSpeed = car.baseMaxSpeed * ev.speedMult;
    }
  }
}

let bannerTimeout;
function showEvent(msg, color='#fff') {
  eventBanner.style.display = 'block';
  eventBanner.textContent = msg;
  eventBanner.style.color = color;
  clearTimeout(bannerTimeout);
  bannerTimeout = setTimeout(() => { if (!activeEvent) eventBanner.style.display = 'none'; }, 3500);
}

// ── HUD ────────────────────────────────────
function updateHUD(player) {
  if (!player) return;
  hudLap.textContent = `${Math.min(player.lap, TOTAL_LAPS)}/${TOTAL_LAPS}`;
  hudSpeed.textContent = Math.round(player.speed * 62);
  const sorted = [...cars].sort((a,b) => ((b.lap-1)*LAP_DISTANCE+b.dist) - ((a.lap-1)*LAP_DISTANCE+a.dist));
  hudPos.textContent = `P${sorted.findIndex(c => c.isPlayer) + 1}`;
  const w = player.tireWear;
  tireDot.style.background = player.blowout ? '#e10600' : w > 60 ? '#00ff88' : w > 30 ? '#ffaa00' : '#e10600';
  const nFill  = document.getElementById('nitroBarFill');
  const nLabel = document.getElementById('nitroHoldLabel');
  if (nFill) {
    nFill.style.width = nitroCharge.toFixed(1) + '%';
    if (nitroActive && nitroCharge > 0) {
      nFill.className = 'active';
      if (nLabel) nLabel.style.color = '#ff8800';
    } else if (nitroCharge < 10) {
      nFill.className = '';
      if (nLabel) nLabel.style.color = 'rgba(255,255,255,0.4)';
    } else {
      nFill.className = '';
      if (nLabel) nLabel.style.color = 'rgba(0,220,255,0.9)';
    }
  }
}

// ── RENDER ─────────────────────────────────
function render() {
  if (!ctx) return;
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);
  const trackW = W * TRACK_WIDTH_RATIO;
  const trackL = (W - trackW) / 2;
  drawTrack(trackL, trackW);
  drawCars(trackL, trackW);
  if (activeEvent?.type === 'rain') drawRain();
}

function drawTrack(trackL, trackW) {
  ctx.fillStyle = '#1a3a1a';
  ctx.fillRect(0, 0, trackL, H);
  ctx.fillRect(trackL + trackW, 0, W - trackL - trackW, H);
  ctx.fillStyle = '#1f4a1f';
  for (const x of [trackL*0.5, trackL + trackW + trackL*0.5]) {
    for (let y = -(roadOffset % 80); y < H; y += 80) ctx.fillRect(x - 8, y, 16, 30);
  }
  ctx.fillStyle = '#2a2a2a';
  ctx.fillRect(trackL, 0, trackW, H);
  ctx.fillStyle = '#262626';
  for (let y = -(roadOffset % 40); y < H; y += 40) ctx.fillRect(trackL, y, trackW, 1);

  ctx.strokeStyle = 'rgba(255,255,255,0.22)';
  ctx.lineWidth = 2;
  ctx.setLineDash([30, 30]);
  const laneW = trackW / 3;
  for (let i = 1; i < 3; i++) {
    const x = trackL + laneW * i;
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  ctx.setLineDash([]);
  drawKerb(trackL, trackL - 10, true);
  drawKerb(trackL + trackW, trackL + trackW + 10, false);
}

function drawKerb(x, x2, isLeft) {
  let red = true;
  const sH = 20;
  for (let y = -(roadOffset % (sH*2)); y < H; y += sH) {
    ctx.fillStyle = red ? '#e10600' : '#ffffff';
    ctx.fillRect(isLeft ? x2 : x, y, Math.abs(x2-x), sH);
    red = !red;
  }
}

function drawCars(trackL, trackW) {
  [...cars].sort((a,b) => a.y - b.y).forEach(car => drawCar(car));
}

// ── PER-TEAM CAR DRAWING ───────────────────
function drawCar(car) {
  const x = car.x;
  const y = car.isPlayer ? H * 0.68 : getAICarY(car);
  car.y = y;

  ctx.save();
  ctx.translate(x, y);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(2, CAR_H/2 + 4, CAR_W*0.6, 8, 0, 0, Math.PI*2);
  ctx.fill();

  // Team-specific livery
  const idx = car.colorIdx;
  if (idx === 0) drawFerrariBody();
  else if (idx === 1) drawRedBullBody();
  else if (idx === 2) drawMcLarenBody();
  else drawMercedesBody();

  // Cockpit (shared)
  ctx.fillStyle = TEAMS[idx].cockpit;
  ctx.beginPath();
  roundRect(ctx, -CAR_W/3, -CAR_H/6, CAR_W*2/3, CAR_H/3.5, 4);
  ctx.fill();

  // Cockpit inner dark
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.beginPath();
  roundRect(ctx, -CAR_W/3 + 2, -CAR_H/6 + 2, CAR_W*2/3 - 4, CAR_H/3.5 - 4, 3);
  ctx.fill();

  // Helmet
  ctx.fillStyle = TEAMS[idx].accent;
  ctx.beginPath();
  ctx.arc(0, -CAR_H/8, 6, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.beginPath();
  ctx.arc(0, -CAR_H/8, 6, Math.PI, Math.PI*2);
  ctx.fill();

  // Wheels
  ctx.fillStyle = '#1a1a1a';
  for (const [wx, wy] of [
    [-CAR_W/2-3, -CAR_H/2+5], [CAR_W/2-5, -CAR_H/2+5],
    [-CAR_W/2-3, CAR_H/2-17], [CAR_W/2-5, CAR_H/2-17]
  ]) {
    ctx.fillRect(wx, wy, 8, 12);
    ctx.fillStyle = '#333';
    ctx.fillRect(wx+1, wy+1, 6, 10);
    ctx.fillStyle = '#555';
    ctx.fillRect(wx+3, wy+4, 2, 4);
    ctx.fillStyle = '#1a1a1a';
  }

  // Exhaust / nitro flame
  if (car.isPlayer && nitroActive && nitroCharge > 0) {
    // Blue glow aura
    ctx.save();
    ctx.shadowBlur = 28; ctx.shadowColor = '#00aaff';
    ctx.strokeStyle = 'rgba(0,180,255,0.45)'; ctx.lineWidth = 3;
    ctx.strokeRect(-CAR_W/2 - 3, -CAR_H/2 - 3, CAR_W + 6, CAR_H + 6);
    ctx.restore();
    // Flame trail
    const flameLen = 30 + Math.random() * 20;
    const grd = ctx.createLinearGradient(0, CAR_H/2, 0, CAR_H/2 + flameLen);
    grd.addColorStop(0,   'rgba(255,140,0,0.95)');
    grd.addColorStop(0.4, 'rgba(0,120,255,0.8)');
    grd.addColorStop(1,   'rgba(0,80,255,0)');
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.moveTo(-7, CAR_H/2);
    ctx.lineTo( 7, CAR_H/2);
    ctx.lineTo( 3, CAR_H/2 + flameLen);
    ctx.lineTo(-3, CAR_H/2 + flameLen);
    ctx.closePath(); ctx.fill();
  } else if (car.speed > 3) {
    ctx.strokeStyle = 'rgba(255,255,255,0.1)';
    ctx.lineWidth = 1;
    for (let i = -1; i <= 1; i++) {
      ctx.beginPath();
      ctx.moveTo(i * 8, CAR_H/2);
      ctx.lineTo(i * 8, CAR_H/2 + 14 + car.speed * 2);
      ctx.stroke();
    }
  }

  // Blowout smoke
  if (car.blowout) {
    for (let i = 0; i < 4; i++) {
      ctx.fillStyle = `rgba(180,180,180,${0.35 - i*0.06})`;
      ctx.beginPath();
      ctx.arc((-1 + (i%3)) * 9, CAR_H/2 + 5 + i*9, 5 + i*4, 0, Math.PI*2);
      ctx.fill();
    }
  }

  // Pit overlay
  if (car.inPit) {
    ctx.fillStyle = 'rgba(255,180,0,0.4)';
    ctx.beginPath();
    roundRect(ctx, -CAR_W/2-2, -CAR_H/2-2, CAR_W+4, CAR_H+4, 8);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = '9px Arial';
    ctx.textAlign = 'center';
    ctx.fillText('PIT', 0, CAR_H/2 + 16);
  }

  // Name tag
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.beginPath();
  roundRect(ctx, -14, -2, 28, 10, 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 7px Arial';
  ctx.textAlign = 'center';
  ctx.fillText(car.name.substring(0,3).toUpperCase(), 0, 6);

  ctx.restore();
}

// Ferrari: bright red, white cockpit band, gold DRS accent
function drawFerrariBody() {
  // Main body
  ctx.fillStyle = '#E8002D';
  ctx.beginPath(); roundRect(ctx, -CAR_W/2, -CAR_H/2, CAR_W, CAR_H, 6); ctx.fill();
  // Darker side channels
  ctx.fillStyle = '#C8001A';
  ctx.fillRect(-CAR_W/2, -CAR_H/2+2, 5, CAR_H-4);
  ctx.fillRect(CAR_W/2-5, -CAR_H/2+2, 5, CAR_H-4);
  // White cockpit accent stripe
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(-CAR_W/2+3, -CAR_H/6-4, CAR_W-6, 4);
  // White spine
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.fillRect(-2, -CAR_H/2+14, 4, CAR_H-26);
  // Nose
  ctx.fillStyle = '#E8002D';
  ctx.beginPath(); roundRect(ctx, -CAR_W/4, -CAR_H/2-10, CAR_W/2, 13, 3); ctx.fill();
  // Front wing
  ctx.fillStyle = '#C8001A';
  ctx.fillRect(-CAR_W/2-5, -CAR_H/2+2, CAR_W+10, 5);
  // Wing endplates (white)
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(-CAR_W/2-5, -CAR_H/2+2, 2, 5);
  ctx.fillRect(CAR_W/2+3, -CAR_H/2+2, 2, 5);
  // Rear wing
  ctx.fillStyle = '#C8001A';
  ctx.fillRect(-CAR_W/2-4, CAR_H/2-8, CAR_W+8, 5);
  // Gold DRS
  ctx.fillStyle = '#FFD700';
  ctx.fillRect(-CAR_W/2-4, CAR_H/2-10, CAR_W+8, 2);
}

// Red Bull: white base, navy panels, gold trim
function drawRedBullBody() {
  // White base
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath(); roundRect(ctx, -CAR_W/2, -CAR_H/2, CAR_W, CAR_H, 6); ctx.fill();
  // Navy top section (nose area)
  ctx.fillStyle = '#1E3A8A';
  ctx.fillRect(-CAR_W/2, -CAR_H/2, CAR_W, CAR_H/3);
  // Navy side panels
  ctx.fillStyle = '#1E3A8A';
  ctx.fillRect(-CAR_W/2, -CAR_H/2, 7, CAR_H);
  ctx.fillRect(CAR_W/2-7, -CAR_H/2, 7, CAR_H);
  // Gold boundary stripe
  ctx.fillStyle = '#FFD700';
  ctx.fillRect(-CAR_W/2, -CAR_H/2 + CAR_H/3, CAR_W, 2);
  ctx.fillRect(-CAR_W/2+7, -CAR_H/2, 2, CAR_H);
  ctx.fillRect(CAR_W/2-9, -CAR_H/2, 2, CAR_H);
  // Nose
  ctx.fillStyle = '#1E3A8A';
  ctx.beginPath(); roundRect(ctx, -CAR_W/4, -CAR_H/2-10, CAR_W/2, 13, 3); ctx.fill();
  // Gold nose tip
  ctx.fillStyle = '#FFD700';
  ctx.fillRect(-3, -CAR_H/2-10, 6, 4);
  // Front wing
  ctx.fillStyle = '#0D2060';
  ctx.fillRect(-CAR_W/2-5, -CAR_H/2+2, CAR_W+10, 5);
  // Gold wing accent
  ctx.fillStyle = '#FFD700';
  ctx.fillRect(-CAR_W/2-5, -CAR_H/2+2, CAR_W+10, 2);
  // Rear wing
  ctx.fillStyle = '#0D2060';
  ctx.fillRect(-CAR_W/2-4, CAR_H/2-8, CAR_W+8, 5);
  ctx.fillStyle = '#FFD700';
  ctx.fillRect(-CAR_W/2-4, CAR_H/2-10, CAR_W+8, 2);
}

// McLaren: papaya orange, black center engine cover
function drawMcLarenBody() {
  // Papaya body
  ctx.fillStyle = '#FF8000';
  ctx.beginPath(); roundRect(ctx, -CAR_W/2, -CAR_H/2, CAR_W, CAR_H, 6); ctx.fill();
  // Black engine cover (center)
  ctx.fillStyle = '#111111';
  ctx.fillRect(-CAR_W/4, -CAR_H/2+2, CAR_W/2, CAR_H/2-2);
  // Papaya return through black (thin central line)
  ctx.fillStyle = '#FF8000';
  ctx.fillRect(-2, -CAR_H/2+2, 4, CAR_H/2-4);
  // Black lower sidepod stripe
  ctx.fillStyle = '#222222';
  ctx.fillRect(-CAR_W/2, CAR_H/8, CAR_W, CAR_H/5);
  // Nose
  ctx.fillStyle = '#FF8000';
  ctx.beginPath(); roundRect(ctx, -CAR_W/4, -CAR_H/2-10, CAR_W/2, 13, 3); ctx.fill();
  // Front wing
  ctx.fillStyle = '#FF8000';
  ctx.fillRect(-CAR_W/2-5, -CAR_H/2+2, CAR_W+10, 5);
  ctx.fillStyle = '#111111';
  ctx.fillRect(-CAR_W/4, -CAR_H/2+2, CAR_W/2, 5);
  // Rear wing
  ctx.fillStyle = '#FF8000';
  ctx.fillRect(-CAR_W/2-4, CAR_H/2-8, CAR_W+8, 5);
  ctx.fillStyle = '#111111';
  ctx.fillRect(-CAR_W/4, CAR_H/2-8, CAR_W/2, 5);
}

// Mercedes: dark charcoal, silver spine, teal accent
function drawMercedesBody() {
  // Charcoal body
  ctx.fillStyle = '#1B1B1B';
  ctx.beginPath(); roundRect(ctx, -CAR_W/2, -CAR_H/2, CAR_W, CAR_H, 6); ctx.fill();
  // Silver upper engine cover
  ctx.fillStyle = '#5a5a5a';
  ctx.fillRect(-CAR_W/2+3, -CAR_H/2+2, CAR_W-6, CAR_H/4);
  // Silver spine
  ctx.fillStyle = '#909090';
  ctx.fillRect(-2.5, -CAR_H/2+2, 5, CAR_H-4);
  // Teal accent stripe (horizontal center)
  ctx.fillStyle = '#00D2BE';
  ctx.fillRect(-CAR_W/2+2, -3, CAR_W-4, 5);
  // Dark side channels
  ctx.fillStyle = '#111111';
  ctx.fillRect(-CAR_W/2, -CAR_H/2+2, 4, CAR_H-4);
  ctx.fillRect(CAR_W/2-4, -CAR_H/2+2, 4, CAR_H-4);
  // Nose
  ctx.fillStyle = '#1B1B1B';
  ctx.beginPath(); roundRect(ctx, -CAR_W/4, -CAR_H/2-10, CAR_W/2, 13, 3); ctx.fill();
  ctx.fillStyle = '#C0C0C0';
  ctx.fillRect(-3, -CAR_H/2-10, 6, 5);
  // Front wing
  ctx.fillStyle = '#2a2a2a';
  ctx.fillRect(-CAR_W/2-5, -CAR_H/2+2, CAR_W+10, 5);
  ctx.fillStyle = '#00D2BE';
  ctx.fillRect(-CAR_W/2-5, -CAR_H/2+2, 5, 2);
  ctx.fillRect(CAR_W/2, -CAR_H/2+2, 5, 2);
  // Rear wing
  ctx.fillStyle = '#2a2a2a';
  ctx.fillRect(-CAR_W/2-4, CAR_H/2-8, CAR_W+8, 5);
  ctx.fillStyle = '#00D2BE';
  ctx.fillRect(-CAR_W/2-4, CAR_H/2-10, CAR_W+8, 2);
}

function getAICarY(car) {
  const player = cars.find(c => c.isPlayer);
  if (!player) return H * 0.4;
  const delta = ((car.lap-1)*LAP_DISTANCE + car.dist) - ((player.lap-1)*LAP_DISTANCE + player.dist);
  return Math.max(-60, Math.min(H+60, H*0.68 - (delta/400)*(H*0.5)));
}

function drawRain() {
  ctx.strokeStyle = 'rgba(100,160,255,0.22)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 40; i++) {
    const rx = Math.random() * W, ry = Math.random() * H;
    ctx.beginPath(); ctx.moveTo(rx, ry); ctx.lineTo(rx-3, ry+15); ctx.stroke();
  }
}

// ── HELPERS ────────────────────────────────
function roundRect(c, x, y, w, h, r) {
  c.moveTo(x+r, y); c.lineTo(x+w-r, y); c.quadraticCurveTo(x+w, y, x+w, y+r);
  c.lineTo(x+w, y+h-r); c.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  c.lineTo(x+r, y+h); c.quadraticCurveTo(x, y+h, x, y+h-r);
  c.lineTo(x, y+r); c.quadraticCurveTo(x, y, x+r, y);
  c.closePath();
}

// ── RACE END ───────────────────────────────
function endRace() {
  if (raceFinished) return;
  raceFinished = true; gameRunning = false;
  const left = cars.filter(c => !c.finished).sort((a,b) =>
    ((b.lap-1)*LAP_DISTANCE+b.dist) - ((a.lap-1)*LAP_DISTANCE+a.dist));
  for (const c of left) { c.finished = true; c.finishTime = (Date.now()-raceStartTime)/1000; finishOrder.push(c); }
  setTimeout(showResults, 1200);
}

function showResults() {
  showScreen('resultScreen');
  const player = finishOrder.find(c => c.isPlayer);
  const pos = finishOrder.indexOf(player) + 1;
  resultPodium.textContent = ['🥇','🥈','🥉','4️⃣'][pos-1] || '4️⃣';

  let html = '';
  finishOrder.forEach((car, i) => {
    const p = i + 1;
    const pc = p===1?'p1':p===2?'p2':p===3?'p3':'';
    const t = car.finishTime ? `${Math.floor(car.finishTime/60)}:${(car.finishTime%60).toFixed(1).padStart(4,'0')}` : '--:--';
    const team = TEAMS[car.colorIdx];
    html += `<div class="result-row ${car.isPlayer?'player-row':''}">
      <div class="result-pos ${pc}">P${p}</div>
      <div class="result-team-badge" style="background:${team.primary};color:${team.accent}">${team.short}</div>
      <div class="result-name">${car.name}</div>
      <div class="result-time">${t}</div>
    </div>`;
  });
  resultCard.innerHTML = html;
}

// ── INIT ───────────────────────────────────
// logos loaded via img src
function handleResize() {
  initCanvas();
  computeTrack();
  // Reposition cars to match new track dimensions without resetting race
  for (const c of cars) {
    c.laneW = gLaneW; c.trackL = gTrackL; c.trackW = gTrackW;
    const tX = gTrackL + gLaneW * c.targetLane + gLaneW / 2;
    c.laneX = tX; c.x = tX;
  }
}
window.addEventListener('resize', () => {
  if (document.getElementById('gameScreen').classList.contains('active')) handleResize();
});
window.addEventListener('orientationchange', () => {
  setTimeout(() => {
    if (document.getElementById('gameScreen').classList.contains('active')) handleResize();
  }, 300);
});
document.addEventListener('touchmove', e => e.preventDefault(), { passive: false });
</script>
